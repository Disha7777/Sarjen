<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Manager</title>

    <!-- Importing Poppins font properly -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #f1f5f9; /* Soft professional background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .todo-container {
            background: #ffffff;
            width: 450px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #1e293b;
            font-weight: 600;
        }

        .input-section {
            display: flex;
            gap: 10px;
        }

        .input-section input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #cbd5e1;
            font-size: 14px;
        }

        .input-section button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            background-color: #334155; /* Professional dark button */
            color: #ffffff;
            cursor: pointer;
            font-size: 14px;
        }

        .input-section button:hover {
            background-color: #1e293b;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            background: #f8fafc;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            border: 1px solid #e2e8f0;
        }

        .btn-group button {
            border: none;
            padding: 6px 10px;
            margin-left: 6px;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
        }

        .edit-btn {
            background-color: #f59e0b;
            color: white;
        }

        .delete-btn {
            background-color: #dc2626;
            color: white;
        }

        .empty-message {
            text-align: center;
            color: #64748b;
            font-size: 13px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="todo-container">
    <h2>Task Manager</h2>

    <div class="input-section">
        <input type="text" id="taskInput" placeholder="Enter new task">
        <button id="addBtn">Add</button>
    </div>

    <ul id="taskList"></ul>
    <div id="emptyMessage" class="empty-message"></div>
</div>

<script>

    // Getting stored tasks (if available)
    let tasks = JSON.parse(localStorage.getItem("taskData")) || [];

    const taskInput = document.getElementById("taskInput");
    const addBtn = document.getElementById("addBtn");
    const taskList = document.getElementById("taskList");
    const emptyMessage = document.getElementById("emptyMessage");

    // Function to store data in localStorage
    function saveData() {
        localStorage.setItem("taskData", JSON.stringify(tasks));
    }

    // Function to display tasks
    function displayTasks() {

        taskList.innerHTML = "";

        if (tasks.length === 0) {
            emptyMessage.textContent = "No tasks available.";
            return;
        }

        emptyMessage.textContent = "";

        tasks.forEach(function(task, index) {

            const li = document.createElement("li");

            li.innerHTML = `
                <span>${task}</span>
                <div class="btn-group">
                    <button class="edit-btn" data-id="${index}">Edit</button>
                    <button class="delete-btn" data-id="${index}">Delete</button>
                </div>
            `;

            taskList.appendChild(li);
        });
    }

    // Add task
    function addTask() {

        const value = taskInput.value.trim();

        if (value === "") {
            alert("Task cannot be empty");
            return;
        }

        tasks.push(value);
        saveData();
        displayTasks();
        taskInput.value = "";
    }

    // Edit task
    function editTask(index) {

        const updated = prompt("Edit task", tasks[index]);

        if (updated && updated.trim() !== "") {
            tasks[index] = updated.trim();
            saveData();
            displayTasks();
        }
    }

    // Delete task
    function deleteTask(index) {

        const confirmDelete = confirm("Are you sure you want to delete this task?");
        if (confirmDelete) {
            tasks.splice(index, 1);
            saveData();
            displayTasks();
        }
    }

    // Event bindings
    addBtn.addEventListener("click", addTask);

    taskInput.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            addTask();
        }
    });

    taskList.addEventListener("click", function(e) {

        if (e.target.classList.contains("edit-btn")) {
            editTask(e.target.dataset.id);
        }

        if (e.target.classList.contains("delete-btn")) {
            deleteTask(e.target.dataset.id);
        }
    });

    // Initial rendering
    displayTasks();

</script>

</body>
</html>
