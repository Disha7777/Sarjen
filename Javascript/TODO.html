<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Manager</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .todo-container {
            background: #ffffff;
            width: 420px;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .input-section {
            display: flex;
            gap: 10px;
        }

        .input-section input {
            flex: 1;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .input-section button {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            background-color: #667eea;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        .input-section button:hover {
            background-color: #5a67d8;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            background: #f5f6fa;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .btn-group button {
            border: none;
            padding: 6px 10px;
            margin-left: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .edit-btn {
            background-color: #f6ad55;
            color: white;
        }

        .delete-btn {
            background-color: #e53e3e;
            color: white;
        }

        .empty-message {
            text-align: center;
            color: #777;
            font-size: 14px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="todo-container">
    <h2>My Task Manager</h2>

    <div class="input-section">
        <input type="text" id="taskInput" placeholder="Add a new task...">
        <button id="addBtn">Add</button>
    </div>

    <ul id="taskList"></ul>
    <div id="emptyMessage" class="empty-message"></div>
</div>

<script>

    // Load tasks from localStorage if available
    let tasks = JSON.parse(localStorage.getItem("taskData")) || [];

    const taskInput = document.getElementById("taskInput");
    const addBtn = document.getElementById("addBtn");
    const taskList = document.getElementById("taskList");
    const emptyMessage = document.getElementById("emptyMessage");

    // Save tasks to localStorage
    function saveToLocalStorage() {
        localStorage.setItem("taskData", JSON.stringify(tasks));
    }

    // Render tasks on screen
    function renderTasks() {
        taskList.innerHTML = "";

        if (tasks.length === 0) {
            emptyMessage.textContent = "No tasks added yet.";
            return;
        } else {
            emptyMessage.textContent = "";
        }

        tasks.forEach((task, index) => {
            const li = document.createElement("li");

            li.innerHTML = `
                <span>${task}</span>
                <div class="btn-group">
                    <button class="edit-btn" data-index="${index}">Edit</button>
                    <button class="delete-btn" data-index="${index}">Delete</button>
                </div>
            `;

            taskList.appendChild(li);
        });
    }

    // Add new task
    function addTask() {
        const taskText = taskInput.value.trim();

        if (taskText === "") {
            alert("Please enter a task.");
            return;
        }

        tasks.push(taskText);
        saveToLocalStorage();
        renderTasks();
        taskInput.value = "";
    }

    // Edit task
    function editTask(index) {
        const updatedTask = prompt("Update your task:", tasks[index]);

        if (updatedTask !== null && updatedTask.trim() !== "") {
            tasks[index] = updatedTask.trim();
            saveToLocalStorage();
            renderTasks();
        }
    }

    // Delete task
    function deleteTask(index) {
        if (confirm("Are you sure you want to delete this task?")) {
            tasks.splice(index, 1);
            saveToLocalStorage();
            renderTasks();
        }
    }

    // Event Listeners
    addBtn.addEventListener("click", addTask);

    taskInput.addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            addTask();
        }
    });

    taskList.addEventListener("click", function(e) {
        if (e.target.classList.contains("edit-btn")) {
            editTask(e.target.dataset.index);
        }

        if (e.target.classList.contains("delete-btn")) {
            deleteTask(e.target.dataset.index);
        }
    });

    // Initial Load
    renderTasks();

</script>

</body>
</html>
